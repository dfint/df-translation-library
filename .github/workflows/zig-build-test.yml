name: zig build test

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.zig'
      - '**/build.zig.zon'
      - '.github/**.yml'

  pull_request:
    branches: [ "main" ]
    paths:
      - '**.zig'
      - '**/build.zig.zon'
      - '.github/**.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zig-version: 
          - "0.16.0"
          # - "master"

    name: Build and Test
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Check formatting
        run: zig fmt --check .

      - name: Install and run zlint
        run: |
          curl -fsSL https://github.com/DonIsaac/zlint/releases/download/v0.8.1/zlint-linux-x86_64 > zlint
          chmod +x zlint
          ./zlint --deny-warnings

      - name: Run tests
        run: zig build test

      - name: Check print_mo cli
        run: |
          cd cli
          zig build run -- print_mo --path=../test_data/test.mo
